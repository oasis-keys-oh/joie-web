<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Oukala Journeys</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f2ed;
      color: #1B2B4B;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .inner { max-width: 420px; }
    .label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.1;
    }
    p {
      color: #666;
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #1B2B4B;
      color: white;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="inner">
    <p class="label">Oukala Journeys</p>
    <h1>You're Offline</h1>
    <p>
      You don't have a connection right now. If you've visited this itinerary before,
      try navigating directly to the day pages — they may be cached and available offline.
    </p>
    <button class="btn" onclick="window.history.back()">Go Back</button>
  </div>
</body>
</html>
